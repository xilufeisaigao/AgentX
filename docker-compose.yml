name: agentx

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${AGENTX_DB_NAME:-agentx_backend}
      MYSQL_USER: ${AGENTX_DB_USERNAME:-agentx}
      MYSQL_PASSWORD: ${AGENTX_DB_PASSWORD:?AGENTX_DB_PASSWORD is required}
      TZ: ${AGENTX_DB_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${AGENTX_MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/schema/agentx_schema_v0.sql:/docker-entrypoint-initdb.d/001-agentx_schema_v0.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${AGENTX_REDIS_PASSWORD}\""]
    environment:
      AGENTX_REDIS_PASSWORD: ${AGENTX_REDIS_PASSWORD:?AGENTX_REDIS_PASSWORD is required}
    ports:
      - "${AGENTX_REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${AGENTX_REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  git-export:
    image: alpine:3.20
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        apk add --no-cache git-daemon >/dev/null &&
        mkdir -p /agentx/repo/remotes &&
        /usr/libexec/git-core/git-daemon
        --reuseaddr
        --verbose
        --base-path=/agentx/repo/remotes
        --export-all
        --listen=0.0.0.0
        --port=9418
        /agentx/repo/remotes
    ports:
      - "${AGENTX_GIT_EXPORT_PORT:-19418}:9418"
    volumes:
      - ${AGENTX_HOST_REPO_ROOT:-./agentx-repo}:/agentx/repo

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      git-export:
        condition: service_started
    ports:
      - "${AGENTX_BACKEND_PORT:-18082}:8080"
    environment:
      SERVER_PORT: 8080
      AGENTX_DB_HOST: mysql
      AGENTX_DB_PORT: 3306
      AGENTX_DB_NAME: ${AGENTX_DB_NAME:-agentx_backend}
      AGENTX_DB_USERNAME: ${AGENTX_DB_USERNAME:-agentx}
      AGENTX_DB_PASSWORD: ${AGENTX_DB_PASSWORD:?AGENTX_DB_PASSWORD is required}
      AGENTX_DB_TIMEZONE: ${AGENTX_DB_TIMEZONE:-Asia/Shanghai}
      AGENTX_REDIS_HOST: redis
      AGENTX_REDIS_PORT: 6379
      AGENTX_REDIS_PASSWORD: ${AGENTX_REDIS_PASSWORD:?AGENTX_REDIS_PASSWORD is required}

      AGENTX_LLM_OUTPUT_LANGUAGE: ${AGENTX_LLM_OUTPUT_LANGUAGE:-zh-CN}
      AGENTX_RUNTIME_LLM_CONFIG_FILE_PATH: ${AGENTX_RUNTIME_LLM_CONFIG_FILE_PATH:-/agentx/runtime-data/runtime/runtime-llm-config.json}
      AGENTX_REQUIREMENT_LLM_PROVIDER: ${AGENTX_REQUIREMENT_LLM_PROVIDER:-mock}
      AGENTX_REQUIREMENT_LLM_BASE_URL: ${AGENTX_REQUIREMENT_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      AGENTX_REQUIREMENT_LLM_MODEL: ${AGENTX_REQUIREMENT_LLM_MODEL:-qwen3.5-plus-2026-02-15}
      AGENTX_REQUIREMENT_LLM_API_KEY: ${AGENTX_REQUIREMENT_LLM_API_KEY:-}
      AGENTX_WORKER_RUNTIME_LLM_PROVIDER: ${AGENTX_WORKER_RUNTIME_LLM_PROVIDER:-mock}
      AGENTX_WORKER_RUNTIME_LLM_BASE_URL: ${AGENTX_WORKER_RUNTIME_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      AGENTX_WORKER_RUNTIME_LLM_MODEL: ${AGENTX_WORKER_RUNTIME_LLM_MODEL:-qwen3.5-plus-2026-02-15}
      AGENTX_WORKER_RUNTIME_LLM_API_KEY: ${AGENTX_WORKER_RUNTIME_LLM_API_KEY:-}

      AGENTX_WORKSPACE_GIT_REPO_ROOT: /agentx/repo
      AGENTX_MERGEGATE_GIT_REPO_ROOT: /agentx/repo
      AGENTX_WORKER_RUNTIME_REPO_ROOT: /agentx/repo
      AGENTX_DELIVERY_CLONE_PUBLISH_REPO_ROOT: /agentx/repo
      AGENTX_DELIVERY_CLONE_PUBLISH_REMOTE_ROOT: /agentx/repo/remotes
      AGENTX_DELIVERY_CLONE_PUBLISH_PUBLIC_BASE: ${AGENTX_DELIVERY_CLONE_PUBLISH_PUBLIC_BASE:-}
      AGENTX_DELIVERY_CLONE_PUBLISH_RETENTION_HOURS: ${AGENTX_DELIVERY_CLONE_PUBLISH_RETENTION_HOURS:-72}
      AGENTX_MERGEGATE_GIT_MAIN_BRANCH: ${AGENTX_MERGEGATE_GIT_MAIN_BRANCH:-main}
      AGENTX_EXECUTION_REPO_ROOT: /agentx/repo
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_MODE: local
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_ROOT: /agentx/runtime-data/runtime-env
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_PYTHON_EXECUTABLE: python
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_ENABLED: "true"
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_USERNAME_PREFIX: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_USERNAME_PREFIX:-ax}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_PASSWORD_LENGTH: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_PASSWORD_LENGTH:-20}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_PROVIDERS: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_PROVIDERS:-mysql,postgresql,redis,mongodb,sqlserver,oracle}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_COMMAND_TEMPLATES_JSON: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_COMMAND_TEMPLATES_JSON:-{}}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MYSQL_HOST: mysql
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MYSQL_PORT: 3306
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MYSQL_DATABASE: ${AGENTX_DB_NAME:-agentx_backend}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MYSQL_ADMIN_USERNAME: root
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MYSQL_ADMIN_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_HOST: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_HOST:-127.0.0.1}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_PORT: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_PORT:-5432}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_DATABASE: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_DATABASE:-agentx_backend}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_ADMIN_DATABASE: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_ADMIN_DATABASE:-postgres}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_ADMIN_USERNAME: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_ADMIN_USERNAME:-postgres}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_ADMIN_PASSWORD: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_POSTGRESQL_ADMIN_PASSWORD:-}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_HOST: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_HOST:-redis}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_PORT: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_PORT:-6379}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_DATABASE: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_DATABASE:-0}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_ADMIN_USERNAME: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_ADMIN_USERNAME:-}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_ADMIN_PASSWORD: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_REDIS_ADMIN_PASSWORD:-${AGENTX_REDIS_PASSWORD:?AGENTX_REDIS_PASSWORD is required}}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_HOST: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_HOST:-127.0.0.1}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_PORT: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_PORT:-27017}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_DATABASE: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_DATABASE:-agentx_backend}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_ADMIN_DATABASE: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_ADMIN_DATABASE:-admin}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_ADMIN_USERNAME: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_ADMIN_USERNAME:-root}
      AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_ADMIN_PASSWORD: ${AGENTX_WORKFORCE_RUNTIME_ENVIRONMENT_DB_ACCOUNT_MONGODB_ADMIN_PASSWORD:-}
      AGENTX_CONTEXTPACK_ARTIFACT_ROOT: /agentx/runtime-data/context
      AGENTX_WORKER_RUNTIME_VERIFY_USE_DOCKER: "false"
      AGENTX_WORKER_RUNTIME_ENABLED: ${AGENTX_WORKER_RUNTIME_ENABLED:-true}
      AGENTX_EXECUTION_VERIFY_WORKER_ID: ${AGENTX_EXECUTION_VERIFY_WORKER_ID:-WRK-BOOT-JAVA-CORE}
      AGENTX_WORKFORCE_BOOTSTRAP_DEFAULT_WORKERS: ${AGENTX_WORKFORCE_BOOTSTRAP_DEFAULT_WORKERS:-true}
    volumes:
      - ${AGENTX_HOST_REPO_ROOT:-./agentx-repo}:/agentx/repo
      - runtime_data:/agentx/runtime-data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/api/v0/sessions || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
  redis_data:
  runtime_data:
