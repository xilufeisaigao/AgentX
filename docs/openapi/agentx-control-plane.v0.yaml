        - ARTIFACT_LINKED
        - RUN_FINISHED

    TaskRunEvent:
      type: object
      required: [event_id, run_id, event_type, body, created_at]
      properties:
        event_id: { type: string }
        run_id: { type: string }
        event_type: { $ref: '#/components/schemas/TaskRunEventType' }
        body: { type: string }
        data_json:
          allOf:
            - $ref: '#/components/schemas/JsonText'
          nullable: true
        created_at: { $ref: '#/components/schemas/Timestamp' }

    HeartbeatRequest:
      type: object
      additionalProperties: false
      properties: {}

    AppendTaskRunEventRequest:
      type: object
      required: [event_type, body]
      properties:
        event_type: { $ref: '#/components/schemas/TaskRunEventType' }
        body: { type: string }
        data_json:
          allOf:
            - $ref: '#/components/schemas/JsonText'
          nullable: true

    FinishRunRequest:
      type: object
      required: [result_status, work_report]
      properties:
        result_status:
          type: string
          enum: [SUCCEEDED, FAILED, CANCELLED]
        work_report:
          type: string
          description: Human-readable work report (markdown is allowed).
        delivery_commit:
          type: string
          nullable: true
          description: Required for IMPL templates that deliver via git.
        artifact_refs_json:
          type: string
          nullable: true
          description: Optional JSON array text for produced artifacts.
          example: '["file:.agentx/reports/RUN-xxx.md"]'

    TaskContext:
      type: object
      required: [requirement_ref, repo_baseline_ref]
      properties:
        requirement_ref: { type: string }
        architecture_refs:
          type: array
          items: { type: string }
        prior_run_refs:
          type: array
          items: { type: string }
        repo_baseline_ref: { type: string }

    GitAlloc:
      type: object
      required: [base_commit, branch_name, worktree_path]
      properties:
        base_commit: { type: string }
        branch_name: { type: string }
        worktree_path: { type: string }

    TaskPackage:
      type: object
      required:
        - run_id
        - task_id
        - module_id
        - context_snapshot_id
        - run_kind
        - task_template_id
        - required_toolpacks
        - task_context
        - read_scope
        - write_scope
        - stop_rules
        - expected_outputs
        - git
      properties:
        run_id: { type: string }
        task_id: { type: string }
        module_id: { type: string }
        context_snapshot_id: { type: string }
        run_kind: { $ref: '#/components/schemas/RunKind' }
        task_template_id: { $ref: '#/components/schemas/TaskTemplateId' }
        required_toolpacks:
          type: array
          items: { type: string }
        task_skill_ref:
          type: string
          nullable: true
        task_context: { $ref: '#/components/schemas/TaskContext' }
        read_scope:
          type: array
          items: { type: string }
        write_scope:
          type: array
          items: { type: string }
        verify_commands:
          type: array
          items: { type: string }
        stop_rules:
          type: array
          items: { type: string }
        expected_outputs:
          type: array
          items: { type: string }
        git: { $ref: '#/components/schemas/GitAlloc' }

    WorkerRuntimeAutoRunRequest:
      type: object
