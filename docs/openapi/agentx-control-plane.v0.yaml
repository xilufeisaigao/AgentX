        created_by_role:
          $ref: '#/components/schemas/RequirementDocCreatedByRole'

    OverwriteRequirementDocContentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Full markdown text following REQ-DOC-v1 or REQ-DOC-v1-zh.

    GenerateRequirementAgentDraftRequest:
      type: object
      required: [user_input]
      properties:
        title:
          type: string
          description: Required before the first draft is created for this session.
          maxLength: 256
        user_input:
          type: string
          description: User message. Backend decides whether to stay in discovery chat or generate/revise draft.
        doc_id:
          type: string
          nullable: true
          description: Existing requirement doc id. If present, backend revises latest version directly.
        persist:
          type: boolean
          default: true
          description: If false, backend may return draft content without DB writes.

    GenerateRequirementAgentDraftResponse:
      type: object
      required: [persisted, provider, model, phase, ready_to_draft, missing_information]
      properties:
        doc_id:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
          minimum: 1
        status:
          allOf:
            - $ref: '#/components/schemas/RequirementDocStatus'
          nullable: true
        content:
          type: string
          nullable: true
          description: Markdown following REQ-DOC-v1 or REQ-DOC-v1-zh when phase is DRAFT_CREATED/DRAFT_REVISED.
        persisted:
          type: boolean
        provider:
          type: string
          enum: [mock, bailian]
        model:
          type: string
        phase:
          type: string
          enum: [DISCOVERY_CHAT, READY_TO_DRAFT, NEED_MORE_INFO, HANDOFF_CREATED, DRAFT_CREATED, DRAFT_REVISED]
        assistant_message:
          type: string
          nullable: true
          description: Backend-generated conversational guidance shown to user.
        ready_to_draft:
          type: boolean
          description: Whether backend judged requirement facts sufficient for first draft.
        missing_information:
          type: array
          description: Missing value-layer facts when backend cannot start drafting yet.
          items:
            type: string

