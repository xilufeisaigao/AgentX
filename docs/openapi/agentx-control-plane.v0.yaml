openapi: 3.0.3
info:
  title: AgentX Control Plane API
  version: v0
  description: |
    Shape-only OpenAPI spec for AgentX Control Plane v0.

    Semantic source of truth (state machines, triggers):
      - docs/09-control-plane-api-contract.md

servers:
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: sessions
  - name: requirementDocs
  - name: tickets
  - name: modules
  - name: tasks
  - name: workers
  - name: runs
  - name: context
  - name: query

paths:
  /api/v0/sessions:
    get:
      tags: [sessions]
      operationId: listSessionsWithCurrentRequirementDoc
      summary: List sessions with current requirement doc snapshot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionHistory'
        '500': { $ref: '#/components/responses/InternalError' }

    post:
      tags: [sessions]
      operationId: createSession
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/pause:
    post:
      tags: [sessions]
      operationId: pauseSession
      summary: Pause a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}:
    get:
      tags: [sessions]
      operationId: getSessionWithCurrentRequirementDoc
      summary: Get a single session with current requirement doc snapshot
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistory'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/progress:
    get:
      tags: [sessions, query]
      operationId: getSessionProgress
      summary: Get workspace overview read model for a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionProgressView'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/ticket-inbox:
    get:
      tags: [sessions, tickets, query]
      operationId: getTicketInbox
      summary: Get aggregated ticket inbox read model for a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, IN_PROGRESS, WAITING_USER, DONE, BLOCKED]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketInboxView'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/task-board:
    get:
      tags: [sessions, tasks, query]
      operationId: getTaskBoard
      summary: Get module-grouped task board read model for a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskBoardView'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/run-timeline:
    get:
      tags: [sessions, runs, query]
      operationId: getRunTimeline
      summary: Get recent run event timeline read model for a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTimelineView'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/resume:
    post:
      tags: [sessions]
      operationId: resumeSession
      summary: Resume a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/complete:
    post:
      tags: [sessions]
      operationId: completeSession
      summary: Complete a session (terminal)
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/requirement-docs:
    post:
      tags: [requirementDocs]
      operationId: createRequirementDoc
      summary: Create a requirement doc for a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequirementDocRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementDoc'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/requirement-agent/drafts:
    post:
      tags: [requirementDocs]
      operationId: generateRequirementAgentDraft
      summary: Requirement-agent discovery chat and draft generation (mock/bailian)
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequirementAgentDraftRequest'
      responses:
        '200':
          description: OK (discovery chat or dry-run draft)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateRequirementAgentDraftResponse'
        '201':
          description: Created (persisted draft/version)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateRequirementAgentDraftResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/requirement-docs/{docId}/versions:
    post:
      tags: [requirementDocs]
      operationId: createRequirementDocVersion
      summary: Create a new requirement doc version (markdown)
      parameters:
        - $ref: '#/components/parameters/DocId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequirementDocVersionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementDocVersion'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/requirement-docs/{docId}/confirm:
    post:
      tags: [requirementDocs]
      operationId: confirmRequirementDoc
      summary: Confirm the current requirement version (side-effect: create ARCH_REVIEW ticket)
      parameters:
        - $ref: '#/components/parameters/DocId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementDoc'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/tickets:
    get:
      tags: [tickets]
      operationId: listTicketsBySession
      summary: List tickets for a session (v0 only requires WAITING_USER)
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: status
          in: query
          required: false
          schema:
            type: string
            description: v0 client uses WAITING_USER for user inbox.
            example: WAITING_USER
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

    post:
      tags: [tickets]
      operationId: createTicket
      summary: Create a ticket (HANDOFF/DECISION/CLARIFICATION/ARCH_REVIEW)
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/requirement-docs/{docId}/content:
    put:
      tags: [requirementDocs]
      operationId: overwriteRequirementDocCurrentContent
      summary: Overwrite current requirement doc content via a new version (frontend direct-edit shortcut)
      parameters:
        - $ref: '#/components/parameters/DocId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverwriteRequirementDocContentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementDocVersion'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/tickets/{ticketId}/claim:
    post:
      tags: [tickets]
      operationId: claimTicket
      summary: Claim a ticket lease (prevents concurrent handling)
      parameters:
        - $ref: '#/components/parameters/TicketId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimTicketRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/tickets/{ticketId}/events:
    post:
      tags: [tickets]
      operationId: appendTicketEvent
      summary: Append a ticket event (audit chain)
      parameters:
        - $ref: '#/components/parameters/TicketId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendTicketEventRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketEvent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/sessions/{sessionId}/modules:
    post:
      tags: [modules]
      operationId: createModule
      summary: Create a module under a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModuleRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkModule'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/modules/{moduleId}/tasks:
    post:
      tags: [tasks]
      operationId: createTask
      summary: Create a task under a module (foreman dispatch)
      parameters:
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkTask'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/tasks/{taskId}/context-status:
    get:
      tags: [tasks, context]
      operationId: getTaskContextStatus
      summary: Get latest context snapshot status for a task
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextSnapshotStatus'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/foreman/tasks/{taskId}/merge-gate/start:
    post:
      tags: [tasks]
      operationId: startMergeGate
      summary: Enter merge gate and create a VERIFY run
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeGateStartResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/workforce/auto-provision:
    post:
      tags: [workers]
      operationId: workforceAutoProvision
      summary: Trigger auto-provisioner once for WAITING_WORKER tasks
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoProvisionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoProvisionResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/execution/lease-recovery:
    post:
      tags: [runs]
      operationId: executionLeaseRecovery
      summary: Recover expired run leases once
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseRecoveryRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRecoveryResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/workers/{workerId}/claim:
    post:
      tags: [workers]
      operationId: workerClaimTask
      summary: Worker pulls a task (requires latest READY context snapshot; may return 204 when no eligible task)
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: A task package was allocated for the worker.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPackage'
        '204':
          description: No task available.
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/workforce/runtime/auto-run:
    post:
      tags: [workers]
      operationId: workforceRuntimeAutoRun
      summary: Trigger worker runtime to claim and execute tasks once
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerRuntimeAutoRunRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerRuntimeAutoRunResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/workforce/cleanup:
    post:
      tags: [workers]
      operationId: workforceCleanup
      summary: Trigger worker pool cleanup once (disable idle READY workers only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerPoolCleanupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerPoolCleanupResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/runs/{runId}/heartbeat:
    post:
      tags: [runs]
      operationId: heartbeat
      summary: Extend lease and update last heartbeat timestamp
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRun'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/runs/{runId}/events:
    post:
      tags: [runs]
      operationId: appendRunEvent
      summary: Append a task run event (progress / NEED_* / artifact)
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendTaskRunEventRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRunEvent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/runs/{runId}/finish:
    post:
      tags: [runs]
      operationId: finishRun
      summary: Finish a run with a work report (SUCCEEDED / FAILED / CANCELLED)
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishRunRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskRun'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/context/role-pack:compile:
    post:
      tags: [context]
      operationId: compileRolePack
      summary: Compile a role context pack (context processor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileRolePackRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleContextPack'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/context/task-context-pack:compile:
    post:
      tags: [context]
      operationId: compileTaskContextPack
      summary: Compile a task context pack (task_context)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileTaskContextPackRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskContextPack'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v0/context/task-skill:compile:
    post:
      tags: [context]
      operationId: compileTaskSkill
      summary: Compile a task_skill artifact for a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileTaskSkillRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSkill'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string }
    DocId:
      name: docId
      in: path
      required: true
      schema: { type: string }
    TicketId:
      name: ticketId
      in: path
      required: true
      schema: { type: string }
    ModuleId:
      name: moduleId
      in: path
      required: true
      schema: { type: string }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string }
    WorkerId:
      name: workerId
      in: path
      required: true
      schema: { type: string }
    RunId:
      name: runId
      in: path
      required: true
      schema: { type: string }

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    PreconditionFailed:
      description: Precondition Failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    InternalError:
      description: Internal Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    Timestamp:
      type: string
      format: date-time

    JsonText:
      type: string
      description: Must be a valid JSON text (string) if present.
      example: "{}"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [CONFLICT, NOT_FOUND, VALIDATION, PRECONDITION_FAILED, INTERNAL]
            message:
              type: string
