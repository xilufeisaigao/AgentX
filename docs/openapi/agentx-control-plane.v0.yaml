          minimum: 0
        skipped_too_fresh:
          type: integer
          minimum: 0
        skipped_missing_toolpacks:
          type: integer
          minimum: 0
        skipped_by_capacity:
          type: integer
          minimum: 0
        created_clarification_tickets:
          type: integer
          minimum: 0
        created_worker_ids:
          type: array
