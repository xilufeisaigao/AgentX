spring:
  application:
    name: agentx-platform
  datasource:
    url: ${AGENTX_DB_URL:jdbc:mysql://127.0.0.1:3306/agentx_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${AGENTX_DB_USERNAME:root}
    password: ${AGENTX_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false

mybatis:
  type-handlers-package: com.agentx.platform.runtime.persistence.mybatis.typehandler
  configuration:
    map-underscore-to-camel-case: false
    default-statement-timeout: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

agentx:
  platform:
    workflow:
      user-defined-enabled: false
      agent-node-rebinding-enabled: true
      parameter-override-enabled: true
    agent:
      architect-suggestion-enabled: true
      architect-auto-pool-enabled: false
    model:
      timeout: ${AGENTX_MODEL_TIMEOUT:PT20S}
      max-retries: ${AGENTX_MODEL_MAX_RETRIES:1}
      deepseek:
        base-url: ${AGENTX_DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${AGENTX_DEEPSEEK_API_KEY:}
    runtime:
      repo-root: ${AGENTX_RUNTIME_REPO_ROOT:${user.dir}}
      base-branch: ${AGENTX_RUNTIME_BASE_BRANCH:HEAD}
      workspace-root: ${AGENTX_RUNTIME_WORKSPACE_ROOT:${java.io.tmpdir}/agentx-runtime-workspaces}
      dispatch-batch-size: ${AGENTX_RUNTIME_DISPATCH_BATCH_SIZE:4}
      lease-ttl: ${AGENTX_RUNTIME_LEASE_TTL:PT20S}
      heartbeat-interval: ${AGENTX_RUNTIME_HEARTBEAT_INTERVAL:PT5S}
      supervisor-scan-interval: ${AGENTX_RUNTIME_SUPERVISOR_SCAN_INTERVAL:PT2S}
      driver-scan-interval: ${AGENTX_RUNTIME_DRIVER_SCAN_INTERVAL:PT2S}
      blocking-poll-interval: ${AGENTX_RUNTIME_BLOCKING_POLL_INTERVAL:PT0.2S}
      blocking-timeout: ${AGENTX_RUNTIME_BLOCKING_TIMEOUT:PT45S}
      max-run-attempts: ${AGENTX_RUNTIME_MAX_RUN_ATTEMPTS:2}
      driver-enabled: ${AGENTX_RUNTIME_DRIVER_ENABLED:true}
      supervisor-enabled: ${AGENTX_RUNTIME_SUPERVISOR_ENABLED:true}
      docker:
        binary: ${AGENTX_RUNTIME_DOCKER_BINARY:docker}
        network-mode: ${AGENTX_RUNTIME_DOCKER_NETWORK_MODE:bridge}
    evaluation:
      artifact-root: ${AGENTX_EVAL_ARTIFACT_ROOT:${user.dir}/artifacts/evaluation-runs}
      trace-collection-enabled: ${AGENTX_EVAL_TRACE_COLLECTION_ENABLED:true}
